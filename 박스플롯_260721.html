<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>구매팀 용역단가 박스플롯 · 업체추가</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f2f2f0;
    --panel:#ffffff;
    --line:#d6d6d2;
    --line-strong:#b3b3ae;
    --ink:#1c1c1a;
    --ink-soft:#6b6b66;
    --header:#2b2b28;
    --box-fill:#e2e2de;
    --box-fill-hover:#d2d2cc;
    --median:#1c1c1a;
    --grid:#e8e8e4;
    --accent-line:#000000;
    --chip:#3a3a36;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    font-size:13px;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'SFMono-Regular','Consolas','Menlo',monospace;}

  header.top{
    background:var(--header);
    color:#fff;
    padding:16px 22px;
    display:flex;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
  }
  header.top h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.02em;}
  header.top .sub{font-size:11.5px;color:#b8b8b3;}

  .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 60px;}

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:3px;
    margin-bottom:16px;
  }
  .panel-head{
    padding:9px 14px;
    border-bottom:1px solid var(--line);
    font-size:11.5px;
    font-weight:700;
    color:var(--ink-soft);
    letter-spacing:.04em;
    text-transform:uppercase;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .panel-body{padding:14px;}

  .filter-row{
    display:flex;
    gap:22px;
    flex-wrap:wrap;
    align-items:flex-end;
  }
  .field{display:flex;flex-direction:column;gap:5px;min-width:150px;}
  .field label{font-size:10.5px;color:var(--ink-soft);font-weight:700;letter-spacing:.03em;}
  select, input[type=text]{
    font-family:inherit;
    font-size:12.5px;
    padding:6px 8px;
    border:1px solid var(--line-strong);
    border-radius:2px;
    background:#fff;
    color:var(--ink);
  }
  select:focus, input:focus{outline:2px solid #8a8a85;outline-offset:0;}

  .grade-toggle{display:flex;flex-wrap:wrap;gap:6px;max-width:520px;}
  .grade-btn{
    font-size:11px;
    padding:5px 9px;
    border:1px solid var(--line-strong);
    background:#fff;
    border-radius:12px;
    cursor:pointer;
    color:var(--ink-soft);
    user-select:none;
  }
  .grade-btn.active{background:var(--header);color:#fff;border-color:var(--header);}

  .vendor-add{position:relative;flex:1;min-width:260px;}
  .vendor-add input{width:100%;}
  .vendor-list{
    position:absolute;top:100%;left:0;right:0;
    background:#fff;border:1px solid var(--line-strong);
    border-top:none;max-height:220px;overflow-y:auto;z-index:20;
    display:none;
  }
  .vendor-list.show{display:block;}
  .vendor-list div{padding:6px 9px;font-size:12px;cursor:pointer;}
  .vendor-list div:hover{background:var(--grid);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
  .chip{
    display:flex;align-items:center;gap:6px;
    background:var(--chip);color:#fff;
    font-size:11.5px;padding:4px 6px 4px 10px;border-radius:12px;
  }
  .chip .mk{width:10px;height:10px;display:inline-block;flex:none;}
  .chip button{
    background:none;border:none;color:#fff;cursor:pointer;
    font-size:13px;line-height:1;padding:0 4px;opacity:.7;
  }
  .chip button:hover{opacity:1;}

  .legend-note{font-size:11px;color:var(--ink-soft);margin-top:8px;}

  .chart-scroll{overflow-x:auto;}
  svg{display:block;}

  .stat-table{width:100%;border-collapse:collapse;font-size:11.8px;}
  .stat-table th, .stat-table td{
    border:1px solid var(--line);
    padding:6px 8px;
    text-align:right;
  }
  .stat-table th{background:#efefeb;text-align:center;font-weight:700;color:var(--ink-soft);font-size:11px;}
  .stat-table td:first-child, .stat-table th:first-child{text-align:left;}
  .stat-table tr:hover td{background:#f7f7f5;}

  .empty{padding:40px;text-align:center;color:var(--ink-soft);font-size:12.5px;}
  .count-badge{font-size:11px;color:var(--ink-soft);font-weight:400;text-transform:none;letter-spacing:0;}
</style>
</head>
<body>

<header class="top">
  <h1>용역단가 박스플롯</h1>
  <span class="sub">기술분류(대분류) · 기술세부(중분류) · 서비스등급 · 서비스단가 · 구매처명</span>
</header>

<div class="wrap">

  <div id="controlsPanel" style="display:none;">
  <div class="panel">
    <div class="panel-head">필터</div>
    <div class="panel-body">
      <div class="filter-row">
        <div class="field">
          <label>대분류</label>
          <select id="selMajor"></select>
        </div>
        <div class="field">
          <label>중분류</label>
          <select id="selMid"></select>
        </div>
        <div class="field" style="flex:2;min-width:280px;">
          <label>서비스등급 (클릭하여 토글)</label>
          <div class="grade-toggle" id="gradeToggle"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      업체추가 · 구매처별 단가 비교
      <span class="count-badge" id="vendorCount"></span>
    </div>
    <div class="panel-body">
      <div class="vendor-add">
        <input type="text" id="vendorInput" placeholder="구매처명 검색 후 선택하여 추가 (예: 삼일, GSC ...)" autocomplete="off">
        <div class="vendor-list" id="vendorList"></div>
      </div>
      <div class="chips" id="chips"></div>
      <div class="legend-note">추가한 업체의 개별 서비스단가는 각 서비스등급 행 위에 ◆ 표식과 업체별 지시선으로 표시됩니다. 회색 박스는 전체 구매처 기준 분포입니다.</div>
    </div>
  </div>
  </div><!-- /controlsPanel -->

  <div class="panel" id="loadPanel" style="display:none;">
    <div class="panel-body">
      <div class="empty" id="loadMsg">데이터 불러오는 중...</div>
    </div>
  </div>

  <div class="panel" id="mainPanels" style="display:none;">
  <div class="panel">
    <div class="panel-head">
      박스플롯 (가로) · 서비스단가 분포
      <span class="count-badge" id="rowCountBadge"></span>
    </div>
    <div class="panel-body chart-scroll" id="chartHost"></div>
  </div>

  <div class="panel">
    <div class="panel-head">서비스등급별 통계</div>
    <div class="panel-body" style="overflow-x:auto;">
      <table class="stat-table" id="statTable"></table>
    </div>
  </div>

  </div><!-- /mainPanels -->

</div>

<script>
const DATA_FILE = '용역단가data.xlsx';
const SHEET_NAME = '용역단가';

let RAW = [];

const GRADE_ORDER = ['특급','고급','중급','초급','컨설턴트','PM(프로젝트매니저)','TECHNICAL CONSULTANT','이사','부장','과장','선임','기타'];
function gradeSort(a,b){
  const ia = GRADE_ORDER.indexOf(a), ib = GRADE_ORDER.indexOf(b);
  if(ia===-1 && ib===-1) return a.localeCompare(b);
  if(ia===-1) return 1;
  if(ib===-1) return -1;
  return ia-ib;
}

let majors, midByMajor, allGrades, allVendors, state;

const VENDOR_MARKERS = ['◆','■','▲','●','◇','□','△','○'];

// ---------- UI: 대분류/중분류 ----------
const selMajor = document.getElementById('selMajor');
const selMid = document.getElementById('selMid');

function fillSelect(sel, arr, val){
  sel.innerHTML = arr.map(v=>`<option value="${v}">${v}</option>`).join('');
  sel.value = val;
}

selMajor.addEventListener('change', ()=>{
  state.major = selMajor.value;
  state.mid = '전체';
  fillSelect(selMid, midByMajor[state.major], state.mid);
  render();
});
selMid.addEventListener('change', ()=>{ state.mid = selMid.value; render(); });

// ---------- UI: 서비스등급 토글 ----------
const gradeToggle = document.getElementById('gradeToggle');
function buildGradeToggle(){
  gradeToggle.innerHTML = allGrades.map(g=>
    `<div class="grade-btn ${state.activeGrades.has(g)?'active':''}" data-g="${g}">${g}</div>`
  ).join('');
  gradeToggle.querySelectorAll('.grade-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const g = btn.dataset.g;
      if(state.activeGrades.has(g)) state.activeGrades.delete(g);
      else state.activeGrades.add(g);
      buildGradeToggle();
      render();
    });
  });
}

// ---------- UI: 업체추가 ----------
const vendorInput = document.getElementById('vendorInput');
const vendorList = document.getElementById('vendorList');
const chipsEl = document.getElementById('chips');
const vendorCountEl = document.getElementById('vendorCount');

function renderVendorList(query){
  const q = query.trim().toLowerCase();
  const matches = allVendors.filter(v=> !state.vendors.includes(v) && (q==='' ? false : v.toLowerCase().includes(q)) ).slice(0,30);
  if(matches.length===0){ vendorList.classList.remove('show'); vendorList.innerHTML=''; return; }
  vendorList.innerHTML = matches.map(v=>`<div data-v="${v}">${v}</div>`).join('');
  vendorList.classList.add('show');
  vendorList.querySelectorAll('div').forEach(d=>{
    d.addEventListener('click', ()=>{
      addVendor(d.dataset.v);
      vendorInput.value='';
      vendorList.classList.remove('show');
    });
  });
}
vendorInput.addEventListener('input', ()=>renderVendorList(vendorInput.value));
vendorInput.addEventListener('focus', ()=>renderVendorList(vendorInput.value));
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.vendor-add')) vendorList.classList.remove('show');
});

function addVendor(v){
  if(state.vendors.includes(v)) return;
  if(state.vendors.length>=8){ alert('업체는 최대 8개까지 추가할 수 있습니다.'); return; }
  state.vendors.push(v);
  renderChips();
  render();
}
function removeVendor(v){
  state.vendors = state.vendors.filter(x=>x!==v);
  renderChips();
  render();
}
function renderChips(){
  chipsEl.innerHTML = state.vendors.map((v,i)=>
    `<span class="chip"><span class="mk">${VENDOR_MARKERS[i%VENDOR_MARKERS.length]}</span>${v}<button data-v="${v}">×</button></span>`
  ).join('');
  chipsEl.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click', ()=>removeVendor(b.dataset.v));
  });
  vendorCountEl.textContent = state.vendors.length ? `${state.vendors.length}개 업체 비교 중` : '';
}

// ---------- 통계 계산 ----------
function quantile(sortedArr, q){
  if(sortedArr.length===1) return sortedArr[0];
  const idx = q*(sortedArr.length-1);
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  const w = idx-lo;
  return sortedArr[lo]*(1-w) + sortedArr[hi]*w;
}
function computeStats(values){
  const s = [...values].sort((a,b)=>a-b);
  const n = s.length;
  const min = s[0], max = s[n-1];
  const q1 = quantile(s,0.25), med = quantile(s,0.5), q3 = quantile(s,0.75);
  const mean = s.reduce((a,b)=>a+b,0)/n;
  const iqr = q3-q1;
  const lowFence = q1 - 1.5*iqr, highFence = q3 + 1.5*iqr;
  const outliers = s.filter(v=> v<lowFence || v>highFence);
  const whiskerLow = s.filter(v=>v>=lowFence)[0] ?? min;
  const whiskerHighArr = s.filter(v=>v<=highFence);
  const whiskerHigh = whiskerHighArr[whiskerHighArr.length-1] ?? max;
  return {n, min, max, q1, med, q3, mean, outliers, whiskerLow, whiskerHigh};
}

function fmt(n){
  return Math.round(n).toLocaleString('ko-KR');
}

function currentFiltered(){
  return RAW.filter(d=>
    (state.major==='전체' || d['대분류']===state.major) &&
    (state.mid==='전체' || d['중분류']===state.mid) &&
    state.activeGrades.has(d['서비스등급'])
  );
}

// ---------- 차트 렌더 ----------
const chartHost = document.getElementById('chartHost');
const rowCountBadge = document.getElementById('rowCountBadge');
const statTable = document.getElementById('statTable');

function render(){
  const filtered = currentFiltered();
  const grades = allGrades.filter(g=>state.activeGrades.has(g) && filtered.some(d=>d['서비스등급']===g));

  rowCountBadge.textContent = filtered.length ? `데이터 ${filtered.length}건 · ${grades.length}개 등급` : '';

  if(grades.length===0){
    chartHost.innerHTML = '<div class="empty">선택한 조건에 해당하는 데이터가 없습니다.</div>';
    statTable.innerHTML = '';
    return;
  }

  const groupStats = grades.map(g=>{
    const vals = filtered.filter(d=>d['서비스등급']===g).map(d=>d['서비스단가']);
    return {grade:g, ...computeStats(vals)};
  });

  const globalMax = Math.max(...groupStats.map(s=>s.max));
  const globalMin = Math.min(0, ...groupStats.map(s=>s.min));

  // ---- SVG geometry ----
  const rowH = 54;
  const leftPad = 190;
  const rightPad = 40;
  const topPad = 30;
  const bottomPad = 40;
  const chartW = 860;
  const chartH = rowH*groupStats.length;
  const W = leftPad + chartW + rightPad;
  const H = topPad + chartH + bottomPad;

  function xScale(v){
    return leftPad + (v-globalMin)/(globalMax-globalMin || 1) * chartW;
  }

  // x axis ticks
  const tickCount = 6;
  let ticks = [];
  for(let i=0;i<=tickCount;i++){
    ticks.push(globalMin + (globalMax-globalMin)*i/tickCount);
  }

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, 'Malgun Gothic', sans-serif">`;

  // grid + axis
  ticks.forEach(t=>{
    const x = xScale(t);
    svg += `<line x1="${x}" y1="${topPad}" x2="${x}" y2="${topPad+chartH}" stroke="var(--grid)" stroke-width="1" />`;
    svg += `<text x="${x}" y="${topPad+chartH+18}" font-size="10.5" fill="#6b6b66" text-anchor="middle" class="mono">${fmt(t)}</text>`;
  });
  svg += `<text x="${leftPad+chartW/2}" y="${H-6}" font-size="10.5" fill="#6b6b66" text-anchor="middle">서비스단가 (원)</text>`;

  groupStats.forEach((s, i)=>{
    const cy = topPad + i*rowH + rowH/2;
    const boxTop = cy - 11, boxH = 22;

    // row separator
    svg += `<line x1="${leftPad}" y1="${topPad+i*rowH}" x2="${leftPad+chartW}" y2="${topPad+i*rowH}" stroke="#eeeee9" stroke-width="1"/>`;

    // label
    svg += `<text x="${leftPad-14}" y="${cy+4}" font-size="12" fill="#1c1c1a" text-anchor="end" font-weight="600">${s.grade}</text>`;
    svg += `<text x="${leftPad-14}" y="${cy+17}" font-size="10" fill="#8a8a85" text-anchor="end">n=${s.n}</text>`;

    // whisker
    svg += `<line x1="${xScale(s.whiskerLow)}" y1="${cy}" x2="${xScale(s.q1)}" y2="${cy}" stroke="#8a8a85" stroke-width="1.4"/>`;
    svg += `<line x1="${xScale(s.q3)}" y1="${cy}" x2="${xScale(s.whiskerHigh)}" y2="${cy}" stroke="#8a8a85" stroke-width="1.4"/>`;
    svg += `<line x1="${xScale(s.whiskerLow)}" y1="${cy-6}" x2="${xScale(s.whiskerLow)}" y2="${cy+6}" stroke="#8a8a85" stroke-width="1.4"/>`;
    svg += `<line x1="${xScale(s.whiskerHigh)}" y1="${cy-6}" x2="${xScale(s.whiskerHigh)}" y2="${cy+6}" stroke="#8a8a85" stroke-width="1.4"/>`;

    // box
    svg += `<rect x="${xScale(s.q1)}" y="${boxTop}" width="${Math.max(1,xScale(s.q3)-xScale(s.q1))}" height="${boxH}" fill="var(--box-fill)" stroke="#8a8a85" stroke-width="1.2"/>`;
    // median
    svg += `<line x1="${xScale(s.med)}" y1="${boxTop}" x2="${xScale(s.med)}" y2="${boxTop+boxH}" stroke="var(--median)" stroke-width="2.2"/>`;

    // outliers
    s.outliers.forEach(o=>{
      svg += `<circle cx="${xScale(o)}" cy="${cy}" r="2.6" fill="#fff" stroke="#8a8a85" stroke-width="1.1"/>`;
    });

    // vendor overlay markers
    state.vendors.forEach((v, vi)=>{
      const pts = filtered.filter(d=>d['서비스등급']===s.grade && d['구매처명']===v).map(d=>d['서비스단가']);
      if(pts.length===0) return;
      const offset = (vi - (state.vendors.length-1)/2) * 8;
      pts.forEach(p=>{
        const x = xScale(p);
        const y = cy + offset;
        svg += vendorMarkerSvg(x,y,vi);
      });
    });
  });

  svg += `</svg>`;
  chartHost.innerHTML = svg;

  // ---- 통계 테이블 ----
  let thead = `<tr><th>서비스등급</th><th>건수</th><th>최소</th><th>Q1</th><th>중앙값</th><th>Q3</th><th>최대</th><th>평균</th></tr>`;
  let tbody = groupStats.map(s=>`
    <tr>
      <td>${s.grade}</td>
      <td class="mono">${s.n}</td>
      <td class="mono">${fmt(s.min)}</td>
      <td class="mono">${fmt(s.q1)}</td>
      <td class="mono">${fmt(s.med)}</td>
      <td class="mono">${fmt(s.q3)}</td>
      <td class="mono">${fmt(s.max)}</td>
      <td class="mono">${fmt(s.mean)}</td>
    </tr>`).join('');
  statTable.innerHTML = thead + tbody;
}

function vendorMarkerSvg(x,y,vi){
  const shapes = [
    (x,y)=>`<path d="M ${x} ${y-5} L ${x+5} ${y} L ${x} ${y+5} L ${x-5} ${y} Z" fill="#1c1c1a" stroke="#fff" stroke-width="1"/>`,
    (x,y)=>`<rect x="${x-4}" y="${y-4}" width="8" height="8" fill="#1c1c1a" stroke="#fff" stroke-width="1"/>`,
    (x,y)=>`<path d="M ${x} ${y-5} L ${x+5} ${y+4} L ${x-5} ${y+4} Z" fill="#1c1c1a" stroke="#fff" stroke-width="1"/>`,
    (x,y)=>`<circle cx="${x}" cy="${y}" r="4.5" fill="#1c1c1a" stroke="#fff" stroke-width="1"/>`,
    (x,y)=>`<path d="M ${x} ${y-5} L ${x+5} ${y} L ${x} ${y+5} L ${x-5} ${y} Z" fill="#fff" stroke="#1c1c1a" stroke-width="1.4"/>`,
    (x,y)=>`<rect x="${x-4}" y="${y-4}" width="8" height="8" fill="#fff" stroke="#1c1c1a" stroke-width="1.4"/>`,
    (x,y)=>`<path d="M ${x} ${y-5} L ${x+5} ${y+4} L ${x-5} ${y+4} Z" fill="#fff" stroke="#1c1c1a" stroke-width="1.4"/>`,
    (x,y)=>`<circle cx="${x}" cy="${y}" r="4.5" fill="#fff" stroke="#1c1c1a" stroke-width="1.4"/>`,
  ];
  return shapes[vi%shapes.length](x,y);
}

// ---------- 데이터 로드 (엑셀 참조) ----------
const loadPanel = document.getElementById('loadPanel');
const loadMsg = document.getElementById('loadMsg');
const controlsPanel = document.getElementById('controlsPanel');
const mainPanels = document.getElementById('mainPanels');

function initFromData(){
  majors = ['전체', ...Array.from(new Set(RAW.map(d=>d['대분류']))).sort()];
  midByMajor = {};
  majors.forEach(m=>{
    if(m==='전체'){ midByMajor[m] = ['전체', ...Array.from(new Set(RAW.map(d=>d['중분류']))).sort()]; }
    else { midByMajor[m] = ['전체', ...Array.from(new Set(RAW.filter(d=>d['대분류']===m).map(d=>d['중분류']))).sort()]; }
  });
  allGrades = Array.from(new Set(RAW.map(d=>d['서비스등급']))).sort(gradeSort);
  allVendors = Array.from(new Set(RAW.map(d=>d['구매처명']))).sort((a,b)=>a.localeCompare(b,'ko'));

  state = {
    major:'전체',
    mid:'전체',
    activeGrades: new Set(allGrades),
    vendors: []
  };

  fillSelect(selMajor, majors, state.major);
  fillSelect(selMid, midByMajor[state.major], state.mid);
  buildGradeToggle();
  renderChips();
  render();

  loadPanel.style.display = 'none';
  controlsPanel.style.display = '';
  mainPanels.style.display = '';
}

async function loadData(){
  loadPanel.style.display = '';
  try{
    const res = await fetch(DATA_FILE);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const sheetName = wb.SheetNames.includes(SHEET_NAME) ? SHEET_NAME : wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:null});
    RAW = rows.filter(r => typeof r['서비스단가'] === 'number');
    if(RAW.length === 0) throw new Error('시트에서 유효한 데이터를 찾지 못했습니다 (컬럼명 확인 필요: 대분류/중분류/서비스등급/서비스단가/구매처명)');
    initFromData();
  }catch(err){
    loadMsg.innerHTML = `엑셀 데이터를 불러오지 못했습니다.<br><br>
      <span class="mono" style="font-size:11px;">${err.message}</span><br><br>
      이 페이지와 같은 폴더(또는 저장소)에 <b>${DATA_FILE}</b> 파일이 있는지,<br>
      시트명이 <b>${SHEET_NAME}</b> 인지 확인해주세요.<br>
      (또한 파일을 그대로 더블클릭해서 여는 경우 브라우저 보안 정책상 로컬 파일을 불러오지 못할 수 있습니다 — GitHub Pages 등 웹 서버를 통해 열어야 합니다.)`;
  }
}

loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>구매팀 용역단가 박스플롯 · 업체추가</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f2f2f0;
    --panel:#ffffff;
    --line:#d6d6d2;
    --line-strong:#b3b3ae;
    --ink:#1c1c1a;
    --ink-soft:#6b6b66;
    --header:#2b2b28;
    --box-fill:#e2e2de;
    --box-fill-hover:#d2d2cc;
    --median:#1c1c1a;
    --grid:#e8e8e4;
    --accent-line:#000000;
    --chip:#3a3a36;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    font-size:13px;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'SFMono-Regular','Consolas','Menlo',monospace;}

  header.top{
    background:var(--header);
    color:#fff;
    padding:16px 22px;
    display:flex;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
  }
  header.top h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.02em;}
  header.top .sub{font-size:11.5px;color:#b8b8b3;}

  .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 60px;}

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:3px;
    margin-bottom:16px;
  }
  .panel-head{
    padding:9px 14px;
    border-bottom:1px solid var(--line);
    font-size:11.5px;
    font-weight:700;
    color:var(--ink-soft);
    letter-spacing:.04em;
    text-transform:uppercase;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .panel-body{padding:14px;}

  .filter-row{
    display:flex;
    gap:22px;
    flex-wrap:wrap;
    align-items:flex-end;
  }
  .field{display:flex;flex-direction:column;gap:5px;min-width:150px;}
  .field label{font-size:10.5px;color:var(--ink-soft);font-weight:700;letter-spacing:.03em;}
  select, input[type=text]{
    font-family:inherit;
    font-size:12.5px;
    padding:6px 8px;
    border:1px solid var(--line-strong);
    border-radius:2px;
    background:#fff;
    color:var(--ink);
  }
  select:focus, input:focus{outline:2px solid #8a8a85;outline-offset:0;}

  .grade-toggle{display:flex;flex-wrap:wrap;gap:6px;max-width:520px;}
  .grade-btn{
    font-size:11px;
    padding:5px 9px;
    border:1px solid var(--line-strong);
    background:#fff;
    border-radius:12px;
    cursor:pointer;
    color:var(--ink-soft);
    user-select:none;
  }
  .grade-btn.active{background:var(--header);color:#fff;border-color:var(--header);}

  .vendor-add{position:relative;flex:1;min-width:260px;}
  .vendor-add input{width:100%;}
  .vendor-list{
    position:absolute;top:100%;left:0;right:0;
    background:#fff;border:1px solid var(--line-strong);
    border-top:none;max-height:220px;overflow-y:auto;z-index:20;
    display:none;
  }
  .vendor-list.show{display:block;}
  .vendor-list div{padding:6px 9px;font-size:12px;cursor:pointer;}
  .vendor-list div:hover{background:var(--grid);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
  .vendor-pill{
    display:inline-block;
    background:#efefeb;
    border:1px solid var(--line-strong);
    color:var(--ink);
    font-size:11px;
    padding:3px 10px;
    border-radius:11px;
  }
  .chip{
    display:flex;align-items:center;gap:6px;
    background:var(--chip);color:#fff;
    font-size:11.5px;padding:4px 6px 4px 10px;border-radius:12px;
  }
  .chip .mk{width:10px;height:10px;display:inline-block;flex:none;}
  .chip button{
    background:none;border:none;color:#fff;cursor:pointer;
    font-size:13px;line-height:1;padding:0 4px;opacity:.7;
  }
  .chip button:hover{opacity:1;}

  .legend-note{font-size:11px;color:var(--ink-soft);margin-top:8px;}

  .chart-scroll{overflow-x:auto;}
  svg{display:block;}

  .stat-table{width:100%;border-collapse:collapse;font-size:11.8px;}
  .stat-table th, .stat-table td{
    border:1px solid var(--line);
    padding:6px 8px;
    text-align:right;
  }
  .stat-table th{background:#efefeb;text-align:center;font-weight:700;color:var(--ink-soft);font-size:11px;position:sticky;top:0;z-index:5;}
  .stat-table td:first-child, .stat-table th:first-child{text-align:left;}
  .stat-table tr:hover td{background:#f7f7f5;}

  .empty{padding:40px;text-align:center;color:var(--ink-soft);font-size:12.5px;}
  .count-badge{font-size:11px;color:var(--ink-soft);font-weight:400;text-transform:none;letter-spacing:0;}

  .bp-tooltip{
    position:fixed;
    display:none;
    z-index:100;
    background:#1c1c1a;
    color:#fff;
    border-radius:4px;
    padding:9px 12px;
    font-size:11.5px;
    line-height:1.6;
    pointer-events:none;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
    white-space:nowrap;
  }
  .bp-tooltip .t-title{font-weight:700;margin-bottom:4px;font-size:12px;}
  .bp-tooltip .t-row{display:flex;justify-content:space-between;gap:16px;}
  .bp-tooltip .t-row span:first-child{color:#b8b8b3;}
  .bp-tooltip .t-row span:last-child{font-family:'SFMono-Regular','Consolas','Menlo',monospace;}
</style>
</head>
<body>

<header class="top">
  <h1>용역단가 박스플롯</h1>
  <span class="sub">기술분류(대분류) · 기술세부(중분류) · 서비스등급 · 서비스단가 · 구매처명</span>
</header>

<div class="bp-tooltip" id="bpTooltip"></div>


<div class="wrap">

  <div id="controlsPanel" style="display:none;">

  <div class="panel">
    <div class="panel-head">필터</div>
    <div class="panel-body">
      <div class="filter-row">
        <div class="field">
          <label>대분류</label>
          <select id="selMajor"></select>
        </div>
        <div class="field">
          <label>중분류</label>
          <select id="selMid"></select>
        </div>
        <div class="field">
          <label>PO생성일 시작</label>
          <input type="date" id="dateFrom">
        </div>
        <div class="field">
          <label>PO생성일 종료</label>
          <input type="date" id="dateTo">
        </div>
        <div class="field" style="justify-content:flex-end;">
          <label>&nbsp;</label>
          <button id="dateResetBtn" type="button" style="font-size:11.5px;padding:6px 10px;border:1px solid var(--line-strong);background:#fff;border-radius:2px;cursor:pointer;color:var(--ink-soft);">전체 기간 보기</button>
        </div>
      </div>
      <div class="legend-note" style="margin-top:8px;">기본값은 오늘로부터 최근 1년간 데이터입니다. 날짜는 PO생성일 기준입니다.</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      업체추가 · 구매처별 단가 비교
      <span class="count-badge" id="vendorCount"></span>
    </div>
    <div class="panel-body">
      <div class="filter-row" style="align-items:flex-start;">
        <div class="field" style="min-width:220px;">
          <label>구매처 목록에서 선택</label>
          <select id="vendorSelect"><option value="">-- 구매처 선택 --</option></select>
        </div>
        <div class="vendor-add" style="flex:1;">
          <label style="display:block;font-size:10.5px;color:var(--ink-soft);font-weight:700;letter-spacing:.03em;margin-bottom:5px;">직접 검색하여 추가</label>
          <input type="text" id="vendorInput" placeholder="구매처명 검색 후 선택하여 추가 (예: 삼일, GSC ...)" autocomplete="off">
          <div class="vendor-list" id="vendorList"></div>
        </div>
      </div>
      <div class="chips" id="chips"></div>
      <div class="legend-note">추가한 업체의 개별 서비스단가는 각 서비스등급 행 위에 ◆ 표식과 업체별 지시선으로 표시됩니다. 회색 박스는 전체 구매처 기준 분포입니다.</div>
    </div>
  </div>
  </div><!-- /controlsPanel -->

  <div class="panel" id="loadPanel" style="display:none;">
    <div class="panel-body">
      <div class="empty" id="loadMsg">데이터 불러오는 중...</div>
    </div>
  </div>

  <div class="panel" id="mainPanels" style="display:none;">
  <div class="panel">
    <div class="panel-head">
      박스플롯 (가로) · 서비스단가 분포
      <span class="count-badge" id="rowCountBadge"></span>
    </div>
    <div class="panel-body chart-scroll" id="chartHost"></div>
  </div>

  <div class="panel">
    <div class="panel-head">서비스등급별 통계</div>
    <div class="panel-body" style="overflow-x:auto;">
      <table class="stat-table" id="statTable"></table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">현재 조회 조건의 구매처 (실시간)</div>
    <div class="panel-body">
      <div style="margin-bottom:16px;">
        <div style="font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:7px;" id="vendorListMajorTitle"></div>
        <div class="chips" id="vendorListMajor" style="gap:5px;"></div>
      </div>
      <div>
        <div style="font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:7px;" id="vendorListMajorMidTitle"></div>
        <div class="chips" id="vendorListMajorMid" style="gap:5px;"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      현재 조회 조건의 원본 데이터
      <span class="count-badge" id="detailCountBadge"></span>
    </div>
    <div class="panel-body" style="overflow:auto; max-height:520px;">
      <table class="stat-table" id="detailTable" style="white-space:nowrap;"></table>
    </div>
  </div>

  </div><!-- /mainPanels -->

</div>

<script>
const GOOGLE_SHEET_ID = '1SYxMT6gHs3otmwop9jkqzJNxpPrbO9Gz1QtZvnG2yss';
const GOOGLE_SHEET_GID = '1649603460';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/export?format=csv&gid=${GOOGLE_SHEET_GID}`;
// 원본(raw) 시트의 실제 컬럼명 → 이 화면에서 쓰는 표준 명칭으로 매핑
const SOURCE_ALIASES = {
  '대분류': ['기술분류'],
  '중분류': ['기술세부'],
  '서비스등급': ['서비스등급내역','서비스 등급내역'],
  '서비스단가': ['서비스단가'],
  '구매처명': ['구매처명']
};
// 상세 데이터 표에 추가로 표시할 참고용 컬럼 (없어도 에러 없이 넘어감)
const DETAIL_ALIASES = {
  'PO생성일': ['PO생성일'],
  'PO번호': ['PO번호'],
  '프로젝트코드': ['프로젝트코드'],
  '프로젝트명': ['프로젝트명'],
  '상주여부': ['상주여부'],
  '서비스단위': ['서비스단위'],
  '서비스수량': ['서비스수량'],
  '비고': ['비고'],
};

let RAW = [];

const GRADE_ORDER = ['특급','고급','중급','초급','컨설턴트','PM(프로젝트매니저)','TECHNICAL CONSULTANT','이사','부장','과장','선임','기타'];
function gradeSort(a,b){
  const ia = GRADE_ORDER.indexOf(a), ib = GRADE_ORDER.indexOf(b);
  if(ia===-1 && ib===-1) return a.localeCompare(b);
  if(ia===-1) return 1;
  if(ib===-1) return -1;
  return ia-ib;
}

let majors, midByMajor, allGrades, allVendors, state;

const PASTEL = [
  {fill:'#FADBD8', stroke:'#E6989F'}, // 파스텔 레드
  {fill:'#AED6F1', stroke:'#5DADE2'}, // 파스텔 블루
  {fill:'#A9DFBF', stroke:'#52BE80'}, // 파스텔 그린
  {fill:'#F9E79F', stroke:'#D4AC0D'}, // 파스텔 옐로우
  {fill:'#D7BDE2', stroke:'#AF7AC5'}, // 파스텔 퍼플
  {fill:'#F8C471', stroke:'#CA6F1E'}, // 파스텔 오렌지
  {fill:'#A3E4D7', stroke:'#17A589'}, // 파스텔 틸
  {fill:'#F5CBA7', stroke:'#CA6F1E'}, // 파스텔 피치
];

// ---------- UI: 대분류/중분류 ----------
const selMajor = document.getElementById('selMajor');
const selMid = document.getElementById('selMid');

function fillSelect(sel, arr, val){
  sel.innerHTML = arr.map(v=>`<option value="${v}">${v}</option>`).join('');
  sel.value = val;
}

selMajor.addEventListener('change', ()=>{
  state.major = selMajor.value;
  state.mid = '전체';
  fillSelect(selMid, midByMajor[state.major], state.mid);
  render();
});
selMid.addEventListener('change', ()=>{ state.mid = selMid.value; render(); });

// ---------- UI: 기간 필터 ----------
const dateFromEl = document.getElementById('dateFrom');
const dateToEl = document.getElementById('dateTo');
const dateResetBtn = document.getElementById('dateResetBtn');

function toDateInputValue(d){
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function defaultDateRange(){
  const to = new Date();
  const from = new Date(to);
  from.setFullYear(to.getFullYear()-1);
  return {from, to};
}
dateFromEl.addEventListener('change', ()=>{
  state.dateFrom = dateFromEl.value ? new Date(dateFromEl.value + 'T00:00:00') : null;
  render();
});
dateToEl.addEventListener('change', ()=>{
  state.dateTo = dateToEl.value ? new Date(dateToEl.value + 'T23:59:59') : null;
  render();
});
dateResetBtn.addEventListener('click', ()=>{
  dateFromEl.value = '';
  dateToEl.value = '';
  state.dateFrom = null;
  state.dateTo = null;
  render();
});

// ---------- UI: 업체추가 ----------
const vendorSelect = document.getElementById('vendorSelect');
const vendorInput = document.getElementById('vendorInput');
const vendorList = document.getElementById('vendorList');
const chipsEl = document.getElementById('chips');
const vendorCountEl = document.getElementById('vendorCount');

function fillVendorSelect(){
  const options = allVendors.filter(v=>!state.vendors.includes(v));
  vendorSelect.innerHTML = '<option value="">-- 구매처 선택 --</option>' +
    options.map(v=>`<option value="${v}">${v}</option>`).join('');
}
vendorSelect.addEventListener('change', ()=>{
  if(vendorSelect.value){
    addVendor(vendorSelect.value);
    vendorSelect.value = '';
  }
});

function renderVendorList(query){
  const q = query.trim().toLowerCase();
  const matches = allVendors.filter(v=> !state.vendors.includes(v) && (q==='' ? false : v.toLowerCase().includes(q)) ).slice(0,30);
  if(matches.length===0){ vendorList.classList.remove('show'); vendorList.innerHTML=''; return; }
  vendorList.innerHTML = matches.map(v=>`<div data-v="${v}">${v}</div>`).join('');
  vendorList.classList.add('show');
  vendorList.querySelectorAll('div').forEach(d=>{
    d.addEventListener('click', ()=>{
      addVendor(d.dataset.v);
      vendorInput.value='';
      vendorList.classList.remove('show');
    });
  });
}
vendorInput.addEventListener('input', ()=>renderVendorList(vendorInput.value));
vendorInput.addEventListener('focus', ()=>renderVendorList(vendorInput.value));
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.vendor-add')) vendorList.classList.remove('show');
});

function addVendor(v){
  if(state.vendors.includes(v)) return;
  if(state.vendors.length>=8){ alert('업체는 최대 8개까지 추가할 수 있습니다.'); return; }
  state.vendors.push(v);
  fillVendorSelect();
  renderChips();
  render();
}
function removeVendor(v){
  state.vendors = state.vendors.filter(x=>x!==v);
  fillVendorSelect();
  renderChips();
  render();
}
function renderChips(){
  chipsEl.innerHTML = state.vendors.map((v,i)=>
    `<span class="chip"><span class="mk" style="background:${PASTEL[i%PASTEL.length].fill};border:1.5px solid ${PASTEL[i%PASTEL.length].stroke};border-radius:50%;"></span>${v}<button data-v="${v}">×</button></span>`
  ).join('');
  chipsEl.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click', ()=>removeVendor(b.dataset.v));
  });
  vendorCountEl.textContent = state.vendors.length ? `${state.vendors.length}개 업체 비교 중` : '';
}

// ---------- 통계 계산 ----------
function quantile(sortedArr, q){
  if(sortedArr.length===1) return sortedArr[0];
  const idx = q*(sortedArr.length-1);
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  const w = idx-lo;
  return sortedArr[lo]*(1-w) + sortedArr[hi]*w;
}
function computeStats(values){
  const s = [...values].sort((a,b)=>a-b);
  const n = s.length;
  const min = s[0], max = s[n-1];
  const q1 = quantile(s,0.25), med = quantile(s,0.5), q3 = quantile(s,0.75);
  const mean = s.reduce((a,b)=>a+b,0)/n;
  const iqr = q3-q1;
  const lowFence = q1 - 1.5*iqr, highFence = q3 + 1.5*iqr;
  const outliers = s.filter(v=> v<lowFence || v>highFence);
  const whiskerLow = s.filter(v=>v>=lowFence)[0] ?? min;
  const whiskerHighArr = s.filter(v=>v<=highFence);
  const whiskerHigh = whiskerHighArr[whiskerHighArr.length-1] ?? max;
  return {n, min, max, q1, med, q3, mean, outliers, whiskerLow, whiskerHigh};
}

function fmt(n){
  return Math.round(n).toLocaleString('ko-KR');
}

// ---------- 툴팁 ----------
const bpTooltip = document.getElementById('bpTooltip');
function showTooltip(s, vStats){
  let vendorHtml = '';
  if(vStats && vStats.length){
    vendorHtml = vStats.map(v=>`
      <div style="margin-top:7px;padding-top:7px;border-top:1px solid #444;">
        <div style="font-weight:700;display:flex;align-items:center;gap:6px;">
          <span style="width:9px;height:9px;border-radius:50%;background:${v.color.fill};border:1.5px solid ${v.color.stroke};display:inline-block;"></span>
          ${v.vendor} <span style="font-weight:400;color:#b8b8b3;">(n=${v.n})</span>
        </div>
        <div class="t-row"><span>최소~최대</span><span>${fmt(v.min)} ~ ${fmt(v.max)}</span></div>
        <div class="t-row"><span>중앙값</span><span>${fmt(v.med)}</span></div>
      </div>`).join('');
  }
  bpTooltip.innerHTML = `
    <div class="t-title">${s.grade} <span style="font-weight:400;color:#b8b8b3;">(n=${s.n}, 전체 구매처)</span></div>
    <div class="t-row"><span>최소</span><span>${fmt(s.min)}</span></div>
    <div class="t-row"><span>Q1</span><span>${fmt(s.q1)}</span></div>
    <div class="t-row"><span>중앙값</span><span>${fmt(s.med)}</span></div>
    <div class="t-row"><span>Q3</span><span>${fmt(s.q3)}</span></div>
    <div class="t-row"><span>최대</span><span>${fmt(s.max)}</span></div>
    <div class="t-row"><span>평균</span><span>${fmt(s.mean)}</span></div>
    ${vendorHtml}
  `;
  bpTooltip.style.display = 'block';
}
function showVendorTooltip(vs, grade){
  bpTooltip.innerHTML = `
    <div class="t-title" style="display:flex;align-items:center;gap:6px;">
      <span style="width:9px;height:9px;border-radius:50%;background:${vs.color.fill};border:1.5px solid ${vs.color.stroke};display:inline-block;flex:none;"></span>
      ${vs.vendor} <span style="font-weight:400;color:#b8b8b3;">· ${grade} (n=${vs.n})</span>
    </div>
    <div class="t-row"><span>최소</span><span>${fmt(vs.min)}</span></div>
    <div class="t-row"><span>Q1</span><span>${fmt(vs.q1)}</span></div>
    <div class="t-row"><span>중앙값</span><span>${fmt(vs.med)}</span></div>
    <div class="t-row"><span>Q3</span><span>${fmt(vs.q3)}</span></div>
    <div class="t-row"><span>최대</span><span>${fmt(vs.max)}</span></div>
    <div class="t-row"><span>평균</span><span>${fmt(vs.mean)}</span></div>
  `;
  bpTooltip.style.display = 'block';
}
function moveTooltip(e){
  const pad = 16;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const tw = bpTooltip.offsetWidth, th = bpTooltip.offsetHeight;
  if(x + tw > window.innerWidth - 8) x = e.clientX - tw - pad;
  if(y + th > window.innerHeight - 8) y = e.clientY - th - pad;
  bpTooltip.style.left = x + 'px';
  bpTooltip.style.top = y + 'px';
}
function hideTooltip(){
  bpTooltip.style.display = 'none';
}

function inDateRange(d){
  if(!state.dateFrom && !state.dateTo) return true;
  if(!d['_poDate']) return false;
  const t = d['_poDate'].getTime();
  if(state.dateFrom && t < state.dateFrom.getTime()) return false;
  if(state.dateTo && t > state.dateTo.getTime()) return false;
  return true;
}

function currentFiltered(){
  return RAW.filter(d=>
    (state.major==='전체' || d['대분류']===state.major) &&
    (state.mid==='전체' || d['중분류']===state.mid) &&
    inDateRange(d)
  );
}

const chartHost = document.getElementById('chartHost');
const rowCountBadge = document.getElementById('rowCountBadge');
const statTable = document.getElementById('statTable');

function render(){
  const filtered = currentFiltered();
  const grades = allGrades.filter(g=>filtered.some(d=>d['서비스등급']===g));

  rowCountBadge.textContent = filtered.length ? `데이터 ${filtered.length}건 · ${grades.length}개 등급` : '';

  if(grades.length===0){
    chartHost.innerHTML = '<div class="empty">선택한 조건에 해당하는 데이터가 없습니다.</div>';
    statTable.innerHTML = '';
    renderVendorLists();
    renderDetailTable([]);
    return;
  }

  const groupStats = grades.map(g=>{
    const vals = filtered.filter(d=>d['서비스등급']===g).map(d=>d['서비스단가']);
    return {grade:g, ...computeStats(vals)};
  });

  const globalMax = Math.max(...groupStats.map(s=>s.max));
  const globalMin = Math.min(0, ...groupStats.map(s=>s.min));

  // ---- SVG geometry ----
  const vendorRowGap = 19;
  const rowH = 76 + state.vendors.length * vendorRowGap;
  const leftPad = 190;
  const rightPad = 40;
  const topPad = 18;
  const bottomPad = 40;
  const chartW = 860;
  const chartH = rowH*groupStats.length;
  const W = leftPad + chartW + rightPad;
  const H = topPad + chartH + bottomPad;

  function xScale(v){
    return leftPad + (v-globalMin)/(globalMax-globalMin || 1) * chartW;
  }
  function fmtShort(n){
    return Math.round(n/10000).toLocaleString('ko-KR') + '만';
  }

  // x axis ticks
  const tickCount = 6;
  let ticks = [];
  for(let i=0;i<=tickCount;i++){
    ticks.push(globalMin + (globalMax-globalMin)*i/tickCount);
  }

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, 'Malgun Gothic', sans-serif">`;

  // grid + axis
  ticks.forEach(t=>{
    const x = xScale(t);
    svg += `<line x1="${x}" y1="${topPad}" x2="${x}" y2="${topPad+chartH}" stroke="var(--grid)" stroke-width="1" />`;
    svg += `<text x="${x}" y="${topPad+chartH+18}" font-size="10.5" fill="#6b6b66" text-anchor="middle" class="mono">${fmt(t)}</text>`;
  });
  svg += `<text x="${leftPad+chartW/2}" y="${H-6}" font-size="10.5" fill="#6b6b66" text-anchor="middle">서비스단가 (원)</text>`;

  const rowVendorStats = [];

  groupStats.forEach((s, i)=>{
    const rowTop = topPad + i*rowH;
    const cy = rowTop + 48;
    const boxTop = cy - 11, boxH = 22;
    const labelY = rowTop + 15;

    // row separator
    svg += `<line x1="${leftPad}" y1="${rowTop}" x2="${leftPad+chartW}" y2="${rowTop}" stroke="#eeeee9" stroke-width="1"/>`;

    // label
    svg += `<text x="${leftPad-14}" y="${cy+4}" font-size="12" fill="#1c1c1a" text-anchor="end" font-weight="600">${s.grade}</text>`;
    svg += `<text x="${leftPad-14}" y="${cy+17}" font-size="10" fill="#8a8a85" text-anchor="end">n=${s.n}</text>`;

    // whisker
    svg += `<line x1="${xScale(s.whiskerLow)}" y1="${cy}" x2="${xScale(s.q1)}" y2="${cy}" stroke="#8a8a85" stroke-width="1.4"/>`;
    svg += `<line x1="${xScale(s.q3)}" y1="${cy}" x2="${xScale(s.whiskerHigh)}" y2="${cy}" stroke="#8a8a85" stroke-width="1.4"/>`;
    svg += `<line x1="${xScale(s.whiskerLow)}" y1="${cy-6}" x2="${xScale(s.whiskerLow)}" y2="${cy+6}" stroke="#8a8a85" stroke-width="1.4"/>`;
    svg += `<line x1="${xScale(s.whiskerHigh)}" y1="${cy-6}" x2="${xScale(s.whiskerHigh)}" y2="${cy+6}" stroke="#8a8a85" stroke-width="1.4"/>`;

    // box
    svg += `<rect x="${xScale(s.q1)}" y="${boxTop}" width="${Math.max(1,xScale(s.q3)-xScale(s.q1))}" height="${boxH}" fill="var(--box-fill)" stroke="#8a8a85" stroke-width="1.2"/>`;
    // median
    svg += `<line x1="${xScale(s.med)}" y1="${boxTop}" x2="${xScale(s.med)}" y2="${boxTop+boxH}" stroke="var(--median)" stroke-width="2.2"/>`;

    // 최소/Q1/중앙값/Q3/최대 값 라벨 (항상 표시, 대각선 배치로 겹침 최소화)
    const labelPoints = [
      {v:s.min, x:xScale(s.whiskerLow)},
      {v:s.q1,  x:xScale(s.q1)},
      {v:s.med, x:xScale(s.med)},
      {v:s.q3,  x:xScale(s.q3)},
      {v:s.max, x:xScale(s.whiskerHigh)},
    ];
    labelPoints.forEach(p=>{
      svg += `<line x1="${p.x}" y1="${labelY+3}" x2="${p.x}" y2="${cy-6}" stroke="#c7c7c2" stroke-width="1" stroke-dasharray="1.5,1.5"/>`;
      svg += `<text x="${p.x}" y="${labelY}" font-size="9" fill="#6b6b66" text-anchor="start" transform="rotate(-40 ${p.x} ${labelY})" class="mono">${fmtShort(p.v)}</text>`;
    });

    // outliers
    s.outliers.forEach(o=>{
      svg += `<circle cx="${xScale(o)}" cy="${cy}" r="2.6" fill="#fff" stroke="#8a8a85" stroke-width="1.1"/>`;
    });

    // 업체별 미니 박스플롯 (기존 박스플롯 위/아래에 겹쳐 표시, 파스텔톤으로 구분)
    const vendorStatsThisRow = [];
    const vendorHitRects = [];
    state.vendors.forEach((v, vi)=>{
      const pts = filtered.filter(d=>d['서비스등급']===s.grade && d['구매처명']===v).map(d=>d['서비스단가']);
      if(pts.length===0) return;
      const vs = computeStats(pts);
      const color = PASTEL[vi % PASTEL.length];
      vendorStatsThisRow.push({vendor:v, color, ...vs});

      const vy = cy + 20 + vi*vendorRowGap;
      const vBoxH = 12;
      const vBoxTop = vy - vBoxH/2;

      // 수염
      svg += `<line x1="${xScale(vs.whiskerLow)}" y1="${vy}" x2="${xScale(vs.q1)}" y2="${vy}" stroke="${color.stroke}" stroke-width="1.2"/>`;
      svg += `<line x1="${xScale(vs.q3)}" y1="${vy}" x2="${xScale(vs.whiskerHigh)}" y2="${vy}" stroke="${color.stroke}" stroke-width="1.2"/>`;
      svg += `<line x1="${xScale(vs.whiskerLow)}" y1="${vy-3.5}" x2="${xScale(vs.whiskerLow)}" y2="${vy+3.5}" stroke="${color.stroke}" stroke-width="1.2"/>`;
      svg += `<line x1="${xScale(vs.whiskerHigh)}" y1="${vy-3.5}" x2="${xScale(vs.whiskerHigh)}" y2="${vy+3.5}" stroke="${color.stroke}" stroke-width="1.2"/>`;
      // 박스 (q1===q3인 경우 최소폭 보정)
      svg += `<rect x="${xScale(vs.q1)}" y="${vBoxTop}" width="${Math.max(2,xScale(vs.q3)-xScale(vs.q1))}" height="${vBoxH}" fill="${color.fill}" fill-opacity="0.85" stroke="${color.stroke}" stroke-width="1.1"/>`;
      // 중앙값
      svg += `<line x1="${xScale(vs.med)}" y1="${vBoxTop}" x2="${xScale(vs.med)}" y2="${vBoxTop+vBoxH}" stroke="${color.stroke}" stroke-width="1.6"/>`;

      // 업체별 개별 호버 히트 영역 (일반 행 툴팁보다 위에 그려서 우선권을 가짐)
      vendorHitRects.push(`<rect class="hit-vendor" data-row="${i}" data-vendor="${encodeURIComponent(v)}" x="${leftPad}" y="${vy-8}" width="${chartW}" height="16" fill="transparent" style="cursor:pointer;"/>`);
    });

    // 호버 툴팁 데이터 기록
    rowVendorStats[i] = vendorStatsThisRow;

    // 호버 툴팁용 히트 영역 (박스+수염 전체를 덮는 투명 사각형)
    svg += `<rect class="hit-row" data-idx="${i}" x="${leftPad}" y="${rowTop}" width="${chartW}" height="${rowH}" fill="transparent" style="cursor:pointer;"/>`;
    // 업체별 히트 영역은 일반 히트 영역보다 나중에(위에) 그려서 우선 반응하도록 함
    svg += vendorHitRects.join('');
  });

  svg += `</svg>`;
  chartHost.innerHTML = svg;

  // ---- 호버 툴팁 ----
  chartHost.querySelectorAll('.hit-row').forEach(el=>{
    const idx = Number(el.dataset.idx);
    const s = groupStats[idx];
    const vStats = rowVendorStats[idx];
    el.addEventListener('mouseenter', ()=> showTooltip(s, vStats));
    el.addEventListener('mousemove', (e)=> moveTooltip(e));
    el.addEventListener('mouseleave', ()=> hideTooltip());
  });
  chartHost.querySelectorAll('.hit-vendor').forEach(el=>{
    const rowIdx = Number(el.dataset.row);
    const vendorName = decodeURIComponent(el.dataset.vendor);
    const grade = groupStats[rowIdx].grade;
    const vs = rowVendorStats[rowIdx].find(x=>x.vendor===vendorName);
    if(!vs) return;
    el.addEventListener('mouseenter', (e)=>{ e.stopPropagation(); showVendorTooltip(vs, grade); });
    el.addEventListener('mousemove', (e)=>{ e.stopPropagation(); moveTooltip(e); });
    el.addEventListener('mouseleave', (e)=>{ e.stopPropagation(); hideTooltip(); });
  });

  renderVendorLists();
  renderDetailTable(filtered);

  // ---- 통계 테이블 ----
  let thead = `<tr><th>서비스등급</th><th>건수</th><th>최소</th><th>Q1</th><th>중앙값</th><th>Q3</th><th>최대</th><th>평균</th></tr>`;
  let tbody = groupStats.map(s=>`
    <tr>
      <td>${s.grade}</td>
      <td class="mono">${s.n}</td>
      <td class="mono">${fmt(s.min)}</td>
      <td class="mono">${fmt(s.q1)}</td>
      <td class="mono">${fmt(s.med)}</td>
      <td class="mono">${fmt(s.q3)}</td>
      <td class="mono">${fmt(s.max)}</td>
      <td class="mono">${fmt(s.mean)}</td>
    </tr>`).join('');
  statTable.innerHTML = thead + tbody;
}

function initFromData(){
  majors = ['전체', ...Array.from(new Set(RAW.map(d=>d['대분류']))).sort()];
  midByMajor = {};
  majors.forEach(m=>{
    if(m==='전체'){ midByMajor[m] = ['전체', ...Array.from(new Set(RAW.map(d=>d['중분류']))).sort()]; }
    else { midByMajor[m] = ['전체', ...Array.from(new Set(RAW.filter(d=>d['대분류']===m).map(d=>d['중분류']))).sort()]; }
  });
  allGrades = Array.from(new Set(RAW.map(d=>d['서비스등급']))).sort(gradeSort);
  allVendors = Array.from(new Set(RAW.map(d=>d['구매처명']))).sort((a,b)=>a.localeCompare(b,'ko'));

  const anyDateAvailable = RAW.some(d=>d['_poDate']);
  const {from, to} = defaultDateRange();
  state = {
    major:'전체',
    mid:'전체',
    vendors: [],
    dateFrom: anyDateAvailable ? from : null,
    dateTo: anyDateAvailable ? to : null,
  };
  if(anyDateAvailable){
    dateFromEl.value = toDateInputValue(from);
    dateToEl.value = toDateInputValue(to);
    dateFromEl.disabled = false;
    dateToEl.disabled = false;
  } else {
    dateFromEl.value = '';
    dateToEl.value = '';
    dateFromEl.disabled = true;
    dateToEl.disabled = true;
    dateFromEl.title = 'PO생성일 데이터를 인식하지 못해 기간 필터를 사용할 수 없습니다.';
    dateToEl.title = dateFromEl.title;
  }

  fillSelect(selMajor, majors, state.major);
  fillSelect(selMid, midByMajor[state.major], state.mid);
  fillVendorSelect();
  renderChips();
  render();

  loadPanel.style.display = 'none';
  controlsPanel.style.display = '';
  mainPanels.style.display = '';
}

async function loadData(){
  loadPanel.style.display = '';
  try{
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const csvText = await res.text();
    if(/^\s*<(!DOCTYPE|html)/i.test(csvText)){
      throw new Error('구글시트 대신 로그인/권한 페이지가 반환됐습니다. 시트 공유 설정을 "링크가 있는 모든 사용자 - 뷰어"로 바꿔주세요.');
    }
    const wb = XLSX.read(csvText, {type:'string', cellDates:true});
    const sheetName = wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const rowsRaw = XLSX.utils.sheet_to_json(ws, {defval:null});

    if(rowsRaw.length === 0) throw new Error('시트에 데이터가 없습니다.');

    const normKey = k => String(k).replace(/\s+/g,'').trim();
    const actualHeaders = Object.keys(rowsRaw[0]);
    const mapping = {};
    Object.keys(SOURCE_ALIASES).forEach(canon=>{
      const candidates = SOURCE_ALIASES[canon];
      let found = null;
      for(const cand of candidates){
        found = actualHeaders.find(h => normKey(h) === normKey(cand));
        if(found) break;
      }
      mapping[canon] = found;
    });

    const missing = Object.keys(mapping).filter(c => !mapping[c]);
    if(missing.length){
      throw new Error(
        `다음 컬럼을 시트에서 찾지 못했습니다: ${missing.join(', ')}\n` +
        `시트에서 감지된 실제 헤더: ${actualHeaders.join(', ')}`
      );
    }

    // 상세 표용 참고 컬럼 매핑 (선택 사항, 없으면 그냥 빈 값으로 표시)
    const detailMapping = {};
    Object.keys(DETAIL_ALIASES).forEach(canon=>{
      const candidates = DETAIL_ALIASES[canon];
      let found = null;
      for(const cand of candidates){
        found = actualHeaders.find(h => normKey(h) === normKey(cand));
        if(found) break;
      }
      detailMapping[canon] = found;
    });

    const clean = v => (v===null || v===undefined || String(v).trim()==='') ? '미분류' : String(v).trim();
    const fmtDetailVal = v => {
      if(v===null || v===undefined || String(v).trim()==='') return '';
      if(v instanceof Date) return v.toLocaleDateString('ko-KR');
      return String(v).trim();
    };

    RAW = rowsRaw
      .filter(r => typeof r[mapping['서비스단가']] === 'number')
      .map(r => {
        const row = {
          '대분류': clean(r[mapping['대분류']]),
          '중분류': clean(r[mapping['중분류']]),
          '서비스등급': clean(r[mapping['서비스등급']]),
          '서비스단가': r[mapping['서비스단가']],
          '구매처명': clean(r[mapping['구매처명']]),
        };
        Object.keys(DETAIL_ALIASES).forEach(canon=>{
          row[canon] = detailMapping[canon] ? fmtDetailVal(r[detailMapping[canon]]) : '';
        });
        const rawPoDate = detailMapping['PO생성일'] ? r[detailMapping['PO생성일']] : null;
        row['_poDate'] = (rawPoDate instanceof Date && !isNaN(rawPoDate)) ? rawPoDate : null;
        return row;
      });

    if(RAW.length === 0) throw new Error('서비스단가가 숫자인 유효한 데이터 행을 찾지 못했습니다.');

    initFromData();
  }catch(err){
    loadMsg.innerHTML = `구글시트 데이터를 불러오지 못했습니다.<br><br>
      <span class="mono" style="font-size:11px; white-space:pre-wrap;">${err.message}</span><br><br>
      구글시트 공유 설정이 <b>"링크가 있는 모든 사용자 - 뷰어(또는 편집자)"</b>로 되어 있는지 확인해주세요.<br>
      (비공개 상태면 브라우저에서 로그인 페이지가 반환되어 데이터를 읽을 수 없습니다.)<br>
